name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload assets to"
        required: true
        default: "v26.7.10"
      target:
        description: "Build target"
        required: true
        type: choice
        default: "windows-x64"
        options:
          - all
          - windows-x64
          - linux-x64
          - macos-aarch64
          - macos-x64

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Resolve build target
        id: matrix
        shell: bash
        env:
          TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'all' }}
        run: |
          case "$TARGET" in
            all)
              echo 'matrix={"include":[{"label":"linux-x64","os":"ubuntu-22.04","args":"","rust-target":""},{"label":"windows-x64","os":"windows-latest","args":"","rust-target":""},{"label":"macos-aarch64","os":"macos-26","args":"--target aarch64-apple-darwin","rust-target":"aarch64-apple-darwin"},{"label":"macos-x64","os":"macos-26-intel","args":"--target x86_64-apple-darwin","rust-target":"x86_64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              ;;
            linux-x64)
              echo 'matrix={"include":[{"label":"linux-x64","os":"ubuntu-22.04","args":"","rust-target":""}]}' >> "$GITHUB_OUTPUT"
              ;;
            windows-x64)
              echo 'matrix={"include":[{"label":"windows-x64","os":"windows-latest","args":"","rust-target":""}]}' >> "$GITHUB_OUTPUT"
              ;;
            macos-aarch64)
              echo 'matrix={"include":[{"label":"macos-aarch64","os":"macos-26","args":"--target aarch64-apple-darwin","rust-target":"aarch64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              ;;
            macos-x64)
              echo 'matrix={"include":[{"label":"macos-x64","os":"macos-26-intel","args":"--target x86_64-apple-darwin","rust-target":"x86_64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported build target: $TARGET" >&2
              exit 1
              ;;
          esac

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Read package version
        id: package-version
        shell: bash
        run: |
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); console.log('version=' + pkg.version)" >> "$GITHUB_OUTPUT"

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: proxy-load ${{ env.RELEASE_TAG }}
          releaseBody: |
            ## Changes

            ### 调整

            - 代理后台默认每 3 分钟执行一次心跳测活，并通过连续失败阈值降低瞬时网络波动造成的误下线。
            - 本地混合代理默认仅监听回环地址，可在高级设置中显式允许局域网访问。
            - 高级设置新增可选入站认证，SOCKS5、HTTP 和 HTTPS CONNECT 共用同一组持久化用户名密码。
            - 优化运行时配置缓存、事件合并和托盘状态刷新，降低高并发和频繁测活时的额外开销。

            ### 修复

            - 修复 HTTP 转发、CONNECT、预读请求体和 WebSocket Upgrade 场景下的连接处理问题。
            - 修复代理配置变更、代理分组路由、熔断状态和测活结果之间可能出现的状态竞争与显示偏差。
            - 修复上游返回 407 时可能被错误判定为代理可用的问题。

            ### 文档

            - 更新 26.7.10 下载文件名示例和本地代理设置说明。
          releaseDraft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          assetNamePattern: proxy-load_${{ steps.package-version.outputs.version }}_[platform]_[arch][setup][ext]

      - name: Upload Windows portable executable
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          PACKAGE_VERSION: ${{ steps.package-version.outputs.version }}
        run: |
          $portable = "src-tauri/target/release/proxy-load-tauri.exe"
          if (-not (Test-Path $portable)) {
            throw "Windows portable executable not found: $portable"
          }
          $asset = "proxy-load_${env:PACKAGE_VERSION}_x64-portable.exe"
          Copy-Item -Path $portable -Destination $asset -Force
          gh release upload $env:RELEASE_TAG $asset --clobber

