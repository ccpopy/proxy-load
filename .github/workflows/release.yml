name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload assets to"
        required: true
        default: "v0.3.3"
      target:
        description: "Build target"
        required: true
        type: choice
        default: "windows-x64"
        options:
          - all
          - windows-x64
          - linux-x64
          - macos-aarch64
          - macos-x64

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Resolve build target
        id: matrix
        shell: bash
        env:
          TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'all' }}
        run: |
          case "$TARGET" in
            all)
              echo 'matrix={"include":[{"label":"linux-x64","os":"ubuntu-22.04","args":"","rust-target":""},{"label":"windows-x64","os":"windows-latest","args":"","rust-target":""},{"label":"macos-aarch64","os":"macos-latest","args":"--target aarch64-apple-darwin","rust-target":"aarch64-apple-darwin"},{"label":"macos-x64","os":"macos-latest","args":"--target x86_64-apple-darwin","rust-target":"x86_64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              ;;
            linux-x64)
              echo 'matrix={"include":[{"label":"linux-x64","os":"ubuntu-22.04","args":"","rust-target":""}]}' >> "$GITHUB_OUTPUT"
              ;;
            windows-x64)
              echo 'matrix={"include":[{"label":"windows-x64","os":"windows-latest","args":"","rust-target":""}]}' >> "$GITHUB_OUTPUT"
              ;;
            macos-aarch64)
              echo 'matrix={"include":[{"label":"macos-aarch64","os":"macos-latest","args":"--target aarch64-apple-darwin","rust-target":"aarch64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              ;;
            macos-x64)
              echo 'matrix={"include":[{"label":"macos-x64","os":"macos-latest","args":"--target x86_64-apple-darwin","rust-target":"x86_64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported build target: $TARGET" >&2
              exit 1
              ;;
          esac

  build:
    name: Build ${{ matrix.label }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.rust-target != ''
        run: rustup target add ${{ matrix.rust-target }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Read package version
        id: package-version
        shell: bash
        run: |
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); console.log('version=' + pkg.version)" >> "$GITHUB_OUTPUT"

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: proxy-load ${{ env.RELEASE_TAG }}
          releaseBody: |
            ## Changes

            ### 新增

            - 增加会话编辑能力。

            ### 调整

            - 代理主动测活改为自适应调度，支持失败节点更快重测、并发测活和近期真实流量成功跳过测活。
            - 高级设置新增失败节点重测间隔和并发测活数配置。
            - SOCKS4 代理配置增加认证限制提示，用户名作为 USERID 发送，密码不再被误认为可用认证字段。
            - 发布包版本、产物命名和 Windows 安装包内部应用版本统一使用 `0.3.3`。

            ### 修复

            - 修复真实流量成功或熔断开启后代理健康状态不能及时同步的问题。
            - 修复 SOCKS4 连接失败时错误信息不明确的问题。

            ### 文档

            - 更新 README 中当前版本产物示例文件名。
          releaseDraft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          assetNamePattern: proxy-load_${{ steps.package-version.outputs.version }}_[platform]_[arch][setup][ext]

      - name: Upload Windows portable executable
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          PACKAGE_VERSION: ${{ steps.package-version.outputs.version }}
        run: |
          $portable = "src-tauri/target/release/proxy-load-tauri.exe"
          if (-not (Test-Path $portable)) {
            throw "Windows portable executable not found: $portable"
          }
          $asset = "proxy-load_${env:PACKAGE_VERSION}_x64-portable.exe"
          Copy-Item -Path $portable -Destination $asset -Force
          gh release upload $env:RELEASE_TAG $asset --clobber
